name: Rokt Plans and Pricing
description: Rokt uses performance-based pricing models — advertisers and ecommerce partners pay based on engagement and conversions rather than flat-rate subscription tiers. Specific commercial terms are negotiated directly with Rokt account managers.
url: https://www.rokt.com/products/product-overview
pricing_model: performance_based
notes: >
  Rokt does not publish a public self-serve pricing page. Access to APIs and
  the platform requires an enterprise agreement or partnership arrangement with
  Rokt. Pricing is outcome-driven: ecommerce partners earn revenue when
  customers engage with non-endemic offers; advertisers pay per engagement or
  conversion. Rate limits and API quotas are defined per contract.
contact: https://www.rokt.com/contact/
